name: code-research-agent

x-app-env: &app-env
  CRA_DEPLOYMENT_PROFILE: team
  CONTROL_DATABASE_URL: postgresql://cra_api:${CRA_API_DB_PASSWORD:?}@postgres:5432/cra_control
  OBSERVABILITY_DATABASE_URL: postgresql://cra_api:${CRA_API_DB_PASSWORD:?}@postgres:5432/cra_observability
  CHECKPOINT_DATABASE_URL: postgresql://cra_worker:${CRA_WORKER_DB_PASSWORD:?}@postgres:5432/cra_checkpoint
  REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:6379/1
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?}@redis:6379/0
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET: ${S3_BUCKET:-cra-artifacts}
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?}
  QDRANT_URL: http://qdrant:6333
  CRA_SIGNING_KEY: ${CRA_SIGNING_KEY:?}

x-worker: &worker
  build:
    context: .
    dockerfile: deploy/Dockerfile.api
  restart: unless-stopped
  environment: *app-env
  depends_on:
    postgres: {condition: service_healthy}
    redis: {condition: service_healthy}
    minio: {condition: service_healthy}
    qdrant: {condition: service_healthy}

services:
  reverse-proxy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    ports: ["${HTTP_PORT:-8080}:80", "${HTTPS_PORT:-8443}:443"]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on: [api, frontend]

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    restart: unless-stopped

  api:
    <<: *worker
    command: ["uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]

  outbox-dispatcher:
    <<: *worker
    environment:
      <<: *app-env
      CONTROL_DATABASE_URL: postgresql://cra_scheduler:${CRA_SCHEDULER_DB_PASSWORD:?}@postgres:5432/cra_control
    command: ["python", "-m", "backend.app.control_plane.team_process", "dispatcher"]

  worker-analysis:
    <<: *worker
    environment:
      <<: *app-env
      CONTROL_DATABASE_URL: postgresql://cra_worker:${CRA_WORKER_DB_PASSWORD:?}@postgres:5432/cra_control
    command: ["celery", "-A", "backend.app.control_plane.celery_worker:app", "worker", "-Q", "cra.analysis,cra.indexing", "--concurrency=2", "--prefetch-multiplier=1"]

  worker-research:
    <<: *worker
    environment:
      <<: *app-env
      CONTROL_DATABASE_URL: postgresql://cra_worker:${CRA_WORKER_DB_PASSWORD:?}@postgres:5432/cra_control
    command: ["celery", "-A", "backend.app.control_plane.celery_worker:app", "worker", "-Q", "cra.research,cra.alignment", "--concurrency=2", "--prefetch-multiplier=1"]

  worker-evaluation:
    <<: *worker
    environment:
      <<: *app-env
      CONTROL_DATABASE_URL: postgresql://cra_worker:${CRA_WORKER_DB_PASSWORD:?}@postgres:5432/cra_control
    command: ["celery", "-A", "backend.app.control_plane.celery_worker:app", "worker", "-Q", "cra.evaluation", "--concurrency=1", "--prefetch-multiplier=1"]

  worker-maintenance:
    <<: *worker
    environment:
      <<: *app-env
      CONTROL_DATABASE_URL: postgresql://cra_worker:${CRA_WORKER_DB_PASSWORD:?}@postgres:5432/cra_control
    command: ["celery", "-A", "backend.app.control_plane.celery_worker:app", "worker", "-Q", "cra.export,cra.maintenance", "--concurrency=1", "--prefetch-multiplier=1"]

  celery-beat:
    <<: *worker
    environment:
      <<: *app-env
      CONTROL_DATABASE_URL: postgresql://cra_scheduler:${CRA_SCHEDULER_DB_PASSWORD:?}@postgres:5432/cra_control
    command: ["python", "-m", "backend.app.control_plane.team_process", "beat"]

  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: cra_control
      CRA_API_DB_PASSWORD: ${CRA_API_DB_PASSWORD:?}
      CRA_WORKER_DB_PASSWORD: ${CRA_WORKER_DB_PASSWORD:?}
      CRA_SCHEDULER_DB_PASSWORD: ${CRA_SCHEDULER_DB_PASSWORD:?}
      CRA_MIGRATOR_DB_PASSWORD: ${CRA_MIGRATOR_DB_PASSWORD:?}
      CRA_AUDITOR_DB_PASSWORD: ${CRA_AUDITOR_DB_PASSWORD:?}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/app/control_plane/postgres:/docker-entrypoint-initdb.d:ro
      - ./deploy/postgres-init.sh:/docker-entrypoint-initdb.d/999-passwords.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d cra_control"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8.0.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?}", "--maxmemory-policy", "noeviction", "--appendonly", "yes"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    volumes: ["qdrant-data:/qdrant/storage"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  minio-data:
  qdrant-data:
  caddy-data:
