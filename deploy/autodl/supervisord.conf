[supervisord]
nodaemon=false
logfile=%(ENV_CRA_DATA_ROOT)s/logs/supervisord.log
pidfile=%(ENV_CRA_DATA_ROOT)s/run/supervisord.pid
childlogdir=%(ENV_CRA_DATA_ROOT)s/logs

[program:inference]
command=%(ENV_CRA_REPO_ROOT)s/deploy/autodl/run-service.sh inference
autostart=true
autorestart=true
priority=10
stdout_logfile=%(ENV_CRA_DATA_ROOT)s/logs/inference.log
stderr_logfile=%(ENV_CRA_DATA_ROOT)s/logs/inference.err.log

[program:api]
command=%(ENV_CRA_REPO_ROOT)s/deploy/autodl/run-service.sh api
autostart=true
autorestart=true
priority=20
stdout_logfile=%(ENV_CRA_DATA_ROOT)s/logs/api.log
stderr_logfile=%(ENV_CRA_DATA_ROOT)s/logs/api.err.log

[program:dispatcher]
